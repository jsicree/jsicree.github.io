<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    <link rel="stylesheet" href="{{ '/style.css' | relative_url }}">
  </head>
  <body>
    <div class="site-wrapper">
      <nav class="sidebar">
        <div class="sidebar-title">{{ site.title }}</div>
        <ul>
          <li><a href="{{ '/' | relative_url }}"{% if page.url == '/' %} class="active"{% endif %}>Home</a></li>
          <li>
            <a href="{{ '/projects.html' | relative_url }}"{% if page.url == '/projects.html' %} class="active"{% endif %}>Projects</a>
            <ul class="subnav">
              <li><a href="{{ '/projects/ai-development.html' | relative_url }}"{% if page.url contains 'ai-development' %} class="active"{% endif %}>AI Development</a></li>
            </ul>
          </li>
        </ul>
      </nav>
      <main class="content">
        {{ content }}
      </main>
    </div>
  </body>
</html>
